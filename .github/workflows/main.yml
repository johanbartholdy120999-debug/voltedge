name: VoltEdge CI/CD

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/voltedge-api:latest .

      - name: Push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/voltedge-api:latest
