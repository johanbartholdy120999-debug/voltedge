name: VoltEdge Final CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Imports
        run: |
          python -c "import main"
          python -c "import database"
          python -c "import models"

      - name: Run Unit Tests
        run: |
          pytest

      - name: Train Machine Learning Models
        run: |
          python train_model.py

      - name: Generate Analytics Plots
        run: |
          python plot_models.py

      - name: Start FastAPI
        run: |
          nohup python -m uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 20

      - name: Verify API
        run: |
          curl --fail http://localhost:8000/docs

  docker:
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -f dockerfile -t ${{ secrets.DOCKER_USERNAME }}/voltedge-api:latest .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/voltedge-api:latest
