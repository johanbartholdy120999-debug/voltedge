name: VoltEdge Final CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify imports
        run: |
          python -c "import main"
          python -c "import database"
          python -c "import models"

      - name: Run tests
        run: |
          pytest

      - name: Train ML models
        run: |
          python train_model.py

      - name: Generate plots
        run: |
          python plot_models.py

  docker:
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/voltedge-api:latest .

      - name: Test Docker container
        run: |
          docker run -d --name voltedge \
            -p 8000:8000 \
            ${{ secrets.DOCKER_USERNAME }}/voltedge-api:latest

          sleep 20

          curl --fail http://localhost:8000/docs

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/voltedge-api:latest
