name: VoltEdge CI/CD Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  continuous-integration:
    name: Continuous Integration
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: voltedgeapp

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Verify Project Imports
        run: |
          python -c "import main"
          python -c "import database"
          python -c "import models"

      - name: Run Unit Tests
        run: pytest

      - name: Train Machine Learning Models
        run: python train_model.py

      - name: Generate Analytics Plots
        run: python plot_models.py

      - name: Start FastAPI
        run: |
          nohup python -m uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 15

      - name: Verify API
        run: |
          curl --fail http://localhost:8000/docs

  continuous-delivery:
    name: Continuous Delivery
    needs: continuous-integration
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: voltedgeapp

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/voltedge-api:latest .

      - name: Run Docker Container
        run: |
          docker run -d \
            --name voltedge \
            -p 8000:8000 \
            ${{ secrets.DOCKER_USERNAME }}/voltedge-api:latest

      - name: Wait for Container
        run: sleep 20

      - name: Verify Docker API
        run: |
          curl --fail http://localhost:8000/docs

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/voltedge-api:latest
