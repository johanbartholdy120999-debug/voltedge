name: VoltEdge Final CI/CD

on:
  push:

    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Debug Environment
        run: |
          echo "=== Current Directory ==="
          pwd

          echo ""
          echo "=== Repository Files ==="
          ls -la

          echo ""
          echo "=== File Tree ==="
          find . -maxdepth 2 -type f | sort

          echo ""
          echo "=== Python Version ==="
          python --version

          echo ""
          echo "=== Python Search Path ==="
          python -c "import sys; print('\n'.join(sys.path))"

          echo ""
          echo "=== Locate main module ==="
          python -c "import importlib.util; print(importlib.util.find_spec('main'))"

          echo ""
          echo "=== Import main ==="
          python -c "import main; print(main.__file__)"

      - name: Verify Imports
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -c "import main"
          python -c "import database"
          python -c "import models"

      - name: Run Unit Tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest -vv

      - name: Train Machine Learning Models
        run: |
          if [ -f train_model.py ]; then
            python train_model.py
          else
            echo "train_model.py not found - skipping."
          fi

      - name: Generate Analytics Plots
        run: |
          if [ -f plot_models.py ]; then
            python plot_models.py
          else
            echo "plot_models.py not found - skipping."
          fi

      - name: Start FastAPI
        run: |
          nohup python -m uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 15

      - name: Verify API
        run: |
          curl --fail http://127.0.0.1:8000/
          curl --fail http://127.0.0.1:8000/docs

  docker:
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -f dockerfile -t ${{ secrets.DOCKER_USERNAME }}/voltedge-api:latest .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/voltedge-api:latest
